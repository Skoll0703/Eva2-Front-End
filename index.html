<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de atencion veterinaria</title>
</head>
<body>

    <h1>Registro de atencion veterinaria</h1>

    <input type="text" id="nombreMascota" placeholder="Nombre de la mascota">
    <input type="text" id="especieMascota" placeholder="Especie mascota">
    <input type="text" id="nombrePropietario" placeholder="Nombre del propietario">
    <input type="number" id="edadMascota" placeholder="Edad" min="0">
    <input type="text" id="estadoMascota" placeholder="Estado de atencion">

    <button id="btnAgregar">Agregar mascota</button>

    <p id="mensaje"></p>

    <h2>Mascotas Registradas</h2>
    <div id="resumenMascotas">
        <p id="mascotasRegistradas">Mascotas Registradas: 0</p>
        <p id="mascotasPendientes">Mascotas Pendientes: 0</p>
        <p id="mascotasAtendidas">Mascotas Atendidas: 0</p>
    </div>
    <ul id="listaMascotas"></ul>

    <script src="script.js"></script>
    
</body>
</html>
